<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="dashboard">

        <h1>Welcome!</h1>

        <label for="city">Search City</label><br><br>

        <input
            type="text"
            id="city"
            placeholder="Enter city name">

        <button id="searchBtn" onclick="getWeather()">Search</button>


        <h3>Temperature</h3>
        <p id="temperature"></p>

        <h3>Humidity</h3>
        <p id="humidity"></p>

        <h3>Wind</h3>
        <p id="wind"></p>

        <h3>Condition</h3>
        <p id="condition"></p>

    </div>

    <script src="dashboard.js"></script>

</body>
</html>
